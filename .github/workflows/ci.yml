name: Tepora CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"

jobs:
  commit-convention:
    name: Commit Convention
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Determine commit range
        id: range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "from=" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate conventional commit messages
        shell: bash
        run: |
          if [ -n "${{ steps.range.outputs.from }}" ]; then
            npm run commitlint -- --from "${{ steps.range.outputs.from }}" --to "${{ steps.range.outputs.to }}"
          else
            npm run commitlint -- --to "${{ steps.range.outputs.to }}"
          fi

  # ============================================
  # Backend Quality Gate
  # ============================================
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Tepora-app/backend-rs

      - name: Rustfmt Check
        run: cargo fmt -- --check

      - name: Clippy Lint
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

  # ============================================
  # Backend Wasm E2E Gate (Windows)
  # ============================================
  backend-wasm-e2e-windows:
    name: Backend Wasm E2E (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Tepora-app/backend-rs

      - name: Build Wasm Runtime Shim
        run: cargo build --features redesign_sandbox --bin wasm_runtime_shim

      - name: Build Wasm MCP Fixture
        run: cargo build --release --target wasm32-wasip1 --manifest-path tests/fixtures/wasm-mcp-echo/Cargo.toml --target-dir tests/fixtures/wasm-mcp-echo/target

      - name: Run Wasm MCP E2E Test
        run: cargo test --features redesign_sandbox --test wasm_mcp_e2e -- --nocapture --test-threads=1

  # ============================================
  # Backend Security Scan
  # ============================================
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ============================================
  # Frontend Quality Gate
  # ============================================
  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck

      - name: Biome Lint & Format
        run: npx biome check src/

      - name: ESLint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm test -- --run --coverage

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./Tepora-app/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # ============================================
  # Dev Sync Pseudo E2E Gate
  # ============================================
  dev-sync-e2e:
    name: Dev Sync Pseudo E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run dev_sync pseudo E2E
        run: npm run test:dev-sync

  # ============================================
  # Flaky Test Quarantine Lane
  # ============================================
  flaky-quarantine:
    name: Flaky Test Quarantine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app
    outputs:
      status: ${{ steps.capture.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run flaky quarantine lane
        id: quarantine
        continue-on-error: true
        run: npm run test:flaky

      - name: Capture quarantine status
        id: capture
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.quarantine.outcome }}" = "success" ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=warn" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload flaky quarantine artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-quarantine-report
          path: |
            Tepora-app/tests/flaky/quarantine-report.json
            Tepora-app/tests/flaky/quarantine-report.md

      - name: Append quarantine summary
        if: always()
        shell: bash
        run: |
          if [ -f tests/flaky/quarantine-report.md ]; then
            cat tests/flaky/quarantine-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# Flaky Test Quarantine Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
  # ============================================
  # Perf p95 Gate
  # ============================================
  perf-p95-gate:
    name: Perf p95 Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Tepora-app/backend-rs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run perf p95 gate
        env:
          TEPORA_PERF_ITERATIONS: '15'
          TEPORA_PERF_OUTPUT: tests/perf/perf-results.json
        run: npm run test:perf

      - name: Upload perf report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-p95-report
          path: Tepora-app/tests/perf/perf-results.json
  # ============================================
  # Frontend Security Scan
  # ============================================
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ============================================
  # Quality Gate Summary
  # ============================================
  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [commit-convention, backend-quality, backend-wasm-e2e-windows, frontend-quality, dev-sync-e2e, flaky-quarantine, perf-p95-gate, backend-security, frontend-security]
    if: always()

    steps:
      - name: Check Quality Gate Status
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.commit-convention.result }}" == "success" ]; then
            echo "✅ Commit Convention: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Commit Convention: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.backend-quality.result }}" == "success" ]; then
            echo "✅ Backend Quality: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend Quality: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-quality.result }}" == "success" ]; then
            echo "✅ Frontend Quality: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend Quality: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.dev-sync-e2e.result }}" == "success" ]; then
            echo "✅ Dev Sync Pseudo E2E: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Dev Sync Pseudo E2E: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.flaky-quarantine.outputs.status }}" == "pass" ]; then
            echo "✅ Flaky Quarantine Lane: CLEAN" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Flaky Quarantine Lane: CHECK REPORT" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.perf-p95-gate.result }}" == "success" ]; then
            echo "✅ Perf p95 Gate: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Perf p95 Gate: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.backend-wasm-e2e-windows.result }}" == "success" ]; then
            echo "✅ Backend Wasm E2E (Windows): PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend Wasm E2E (Windows): FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.backend-security.result }}" == "success" ]; then
            echo "✅ Backend Security: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Backend Security: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-security.result }}" == "success" ]; then
            echo "✅ Frontend Security: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Frontend Security: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.commit-convention.result }}" != "success" ] || [ "${{ needs.backend-quality.result }}" != "success" ] || [ "${{ needs.backend-wasm-e2e-windows.result }}" != "success" ] || [ "${{ needs.frontend-quality.result }}" != "success" ] || [ "${{ needs.dev-sync-e2e.result }}" != "success" ] || [ "${{ needs.perf-p95-gate.result }}" != "success" ]; then
            echo "❌ **QUALITY GATE FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **QUALITY GATE PASSED**" >> $GITHUB_STEP_SUMMARY
          fi
