name: Tepora CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"

jobs:
  # ============================================
  # Backend Quality Gate
  # ============================================
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Tepora-app/backend-rs

      - name: Rustfmt Check
        run: cargo fmt -- --check

      - name: Clippy Lint
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

  # ============================================
  # Backend Wasm E2E Gate (Windows)
  # ============================================
  backend-wasm-e2e-windows:
    name: Backend Wasm E2E (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Tepora-app/backend-rs

      - name: Build Wasm Runtime Shim
        run: cargo build --features redesign_sandbox --bin wasm_runtime_shim

      - name: Build Wasm MCP Fixture
        run: cargo build --release --target wasm32-wasip1 --manifest-path tests/fixtures/wasm-mcp-echo/Cargo.toml --target-dir tests/fixtures/wasm-mcp-echo/target

      - name: Run Wasm MCP E2E Test
        run: cargo test --features redesign_sandbox --test wasm_mcp_e2e -- --nocapture --test-threads=1

  # ============================================
  # Backend Security Scan
  # ============================================
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/backend-rs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ============================================
  # Frontend Quality Gate
  # ============================================
  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck

      - name: Biome Lint & Format
        run: npx biome check src/

      - name: ESLint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm test -- --run --coverage

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./Tepora-app/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # ============================================
  # Dev Sync Pseudo E2E Gate
  # ============================================
  dev-sync-e2e:
    name: Dev Sync Pseudo E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run dev_sync pseudo E2E
        run: npm run test:dev-sync

  # ============================================
  # Frontend Security Scan
  # ============================================
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tepora-app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Tepora-app/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ============================================
  # Quality Gate Summary
  # ============================================
  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-wasm-e2e-windows, frontend-quality, dev-sync-e2e, backend-security, frontend-security]
    if: always()

    steps:
      - name: Check Quality Gate Status
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-quality.result }}" == "success" ]; then
            echo "✅ Backend Quality: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend Quality: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-quality.result }}" == "success" ]; then
            echo "✅ Frontend Quality: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend Quality: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.dev-sync-e2e.result }}" == "success" ]; then
            echo "✅ Dev Sync Pseudo E2E: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Dev Sync Pseudo E2E: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.backend-wasm-e2e-windows.result }}" == "success" ]; then
            echo "✅ Backend Wasm E2E (Windows): PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend Wasm E2E (Windows): FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.backend-security.result }}" == "success" ]; then
            echo "✅ Backend Security: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Backend Security: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-security.result }}" == "success" ]; then
            echo "✅ Frontend Security: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Frontend Security: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if quality checks failed
          if [ "${{ needs.backend-quality.result }}" != "success" ] || [ "${{ needs.backend-wasm-e2e-windows.result }}" != "success" ] || [ "${{ needs.frontend-quality.result }}" != "success" ] || [ "${{ needs.dev-sync-e2e.result }}" != "success" ]; then
            echo "❌ **QUALITY GATE FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **QUALITY GATE PASSED**" >> $GITHUB_STEP_SUMMARY
          fi