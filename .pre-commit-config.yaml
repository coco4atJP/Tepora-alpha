# Tepora Quality Gates - Pre-commit Configuration
# https://pre-commit.com/
#
# Installation:
#   pip install pre-commit
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Manual run:
#   pre-commit run --hook-stage pre-commit
#   pre-commit run --hook-stage pre-push --all-files

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit, pre-push]
      - id: end-of-file-fixer
        stages: [pre-commit, pre-push]
      - id: check-yaml
        stages: [pre-commit, pre-push]
      - id: check-json
        stages: [pre-commit, pre-push]
      - id: check-toml
        stages: [pre-commit, pre-push]
      - id: check-added-large-files
        args: ['--maxkb=1000']
        stages: [pre-commit, pre-push]
      - id: check-merge-conflict
        stages: [pre-commit, pre-push]
      - id: mixed-line-ending
        args: ['--fix=lf']
        stages: [pre-commit, pre-push]
      - id: detect-private-key
        stages: [pre-commit, pre-push]

  # Rust
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (backend)
        entry: cargo
        args:
          - fmt
          - --manifest-path
          - Tepora-app/backend-rs/Cargo.toml
          - --all
          - --
          - --check
        language: system
        files: ^Tepora-app/backend-rs/
        pass_filenames: false
        stages: [pre-commit, pre-push]
      - id: cargo-clippy
        name: cargo clippy (backend)
        entry: cargo
        args:
          - clippy
          - --manifest-path
          - Tepora-app/backend-rs/Cargo.toml
          - --all-targets
          - --
          - -D
          - warnings
        language: system
        files: ^Tepora-app/backend-rs/
        pass_filenames: false
        stages: [pre-push]
      - id: cargo-test
        name: cargo test (backend)
        entry: cargo
        args:
          - test
          - --manifest-path
          - Tepora-app/backend-rs/Cargo.toml
          - --all-targets
        language: system
        files: ^Tepora-app/backend-rs/
        pass_filenames: false
        stages: [pre-push]

  # Frontend formatting/linting
  - repo: local
    hooks:
      - id: biome
        name: biome (frontend)
        entry: npx
        args:
          - --prefix
          - Tepora-app/frontend
          - biome
          - check
          - --write
          - --no-errors-on-unmatched
        language: system
        types_or: [javascript, jsx, typescript, tsx, json]
        files: ^Tepora-app/frontend/src/
        stages: [pre-commit, pre-push]

  # Full frontend validation
  - repo: local
    hooks:
      - id: typescript
        name: typescript (frontend)
        entry: npm
        args:
          - --prefix
          - Tepora-app/frontend
          - run
          - typecheck
        language: system
        types_or: [typescript, tsx]
        files: ^Tepora-app/frontend/src/
        pass_filenames: false
        stages: [pre-push]

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json|uv\.lock
        stages: [pre-commit, pre-push]

# CI-specific settings
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [typescript, cargo-clippy, cargo-test]  # These require full local environment