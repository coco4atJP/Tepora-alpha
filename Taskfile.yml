# Tepora Project - Task Runner Wrapper
# Canonical definitions live in Tepora-app/Taskfile.yml

version: '3'

tasks:
  default:
    desc: "Show available tasks from Tepora-app"
    cmds:
      - task -d Tepora-app --list

  package:
    desc: "Delegate: package"
    cmds:
      - task -d Tepora-app package

